<div class="app-shell">
  <app-header
    [pageTitle]="pageTitle"
    [pageSubtitle]="pageSubtitle"
    [isBoardView]="isBoardView"
    (homeSelected)="showHome()"
    (projectFormRequested)="openProjectForm()"
    (laneFormRequested)="openLaneForm()"
    (noteFormRequested)="openNoteForm()"
  ></app-header>

  <main>
    <app-project-home
      *ngIf="!isBoardView"
      [projects]="state.projects"
      (projectSelected)="showBoard($event)"
    ></app-project-home>

    <app-project-board
      *ngIf="activeProject as project"
      [project]="project"
      [flippedNoteIds]="flippedNoteIds"
      (noteFlipped)="toggleNoteFlip($event)"
      (noteStatusChanged)="updateNoteStatus($event.note, $event.status)"
      (noteEdited)="openNoteForm($event)"
      (noteCreated)="openNoteForm(undefined, $event)"
      (releaseSliceRenamed)="renameReleaseSlice($event)"
      (noteDeleted)="deleteNote(project, $event)"
    ></app-project-board>
  </main>
</div>

<app-project-dialog
  #projectDialog
  (projectCreated)="createProject($event)"
></app-project-dialog>

<app-lane-dialog
  #laneDialog
  (laneAdded)="addLane($event)"
></app-lane-dialog>

<app-note-dialog
  #noteDialog
  [lanes]="activeProject?.templateType === 'storyMap' ? activeProject?.releaseSlices ?? [] : activeProject?.lanes ?? []"
  [isStoryMap]="activeProject?.templateType === 'storyMap'"
  (noteSaved)="saveNote($event)"
></app-note-dialog>
