<header class="hero">
  <div>
    <p class="eyebrow">StickyStack prototype</p>
    <h1 id="page-title">{{ pageTitle }}</h1>
    <p id="page-subtitle" class="subtitle">{{ pageSubtitle }}</p>
  </div>
  <div class="header-actions">
    @if (isBoardView) {
      <button
        id="back-home"
        class="ghost"
        type="button"
        (click)="homeSelected.emit()"
      >
        ← Projects
      </button>
    }
    @if (!isBoardView) {
      <button
        id="open-project-modal"
        class="primary"
        type="button"
        (click)="projectFormRequested.emit()"
      >
        + New project
      </button>
    }
    @if (isBoardView) {
      <button
        id="open-lane-modal"
        class="primary"
        type="button"
        (click)="laneFormRequested.emit()"
      >
        + Add swim lane
      </button>
      <button
        id="open-note-modal"
        class="accent"
        type="button"
        (click)="noteFormRequested.emit()"
      >
        + Add note
      </button>
    }
  </div>
</header>
