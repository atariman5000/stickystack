<dialog #laneModal id="lane-modal" class="modal">
  <form
    #laneFormRef="ngForm"
    method="dialog"
    class="modal-card"
    (ngSubmit)="addLane(laneFormRef)"
  >
    <div class="modal-header">
      <h2>Add swim lane</h2>
      <button
        class="icon-button"
        type="button"
        aria-label="Close lane form"
        (click)="closeDialog()"
      >
        ×
      </button>
    </div>
    <label>
      Lane / status name
      <input
        name="laneName"
        [(ngModel)]="laneName"
        required
        maxlength="36"
        placeholder="Blocked"
      />
    </label>
    <button class="primary full" type="submit">Add swim lane</button>
  </form>
</dialog>
